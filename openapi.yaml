openapi: 3.1.0
info:
  title: Legion Platform API
  version: 3.0.0
servers:
  - url: https://us-gov.legion.picogrid.com
    description: US Government Production API
  - url: https://legion-staging.com
    description: Staging API
  - url: https://legion-demo.com
    description: Demo API
paths:
  /v3/.well-known/oauth-authorization-server:
    get:
      summary: Get OAuth 2.0 Authorization Server Metadata
      description: Returns OAuth 2.0 authorization server metadata as defined in RFC 8414 by proxying to Keycloak's well-known endpoint
      tags:
        - Auth
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                example:
                  authorization_endpoint: https://auth.legion.com/realms/legion/protocol/openid-connect/auth
                  code_challenge_methods_supported:
                    - plain
                    - S256
                  grant_types_supported:
                    - authorization_code
                    - refresh_token
                    - client_credentials
                  introspection_endpoint: https://auth.legion.com/realms/legion/protocol/openid-connect/token/introspect
                  issuer: https://auth.legion.com/realms/legion
                  jwks_uri: https://auth.legion.com/realms/legion/protocol/openid-connect/certs
                  response_types_supported:
                    - code
                    - id_token
                    - token id_token
                  revocation_endpoint: https://auth.legion.com/realms/legion/protocol/openid-connect/revoke
                  scopes_supported:
                    - openid
                    - profile
                    - email
                    - offline_access
                  token_endpoint: https://auth.legion.com/realms/legion/protocol/openid-connect/token
                properties:
                  authorization_endpoint:
                    example: https://auth.legion.com/realms/legion/protocol/openid-connect/auth
                    type: string
                  code_challenge_methods_supported:
                    example:
                      - plain
                      - S256
                    items:
                      type: string
                    type: array
                  device_authorization_endpoint:
                    example: https://auth.legion.com/realms/legion/protocol/openid-connect/auth/device
                    type: string
                  grant_types_supported:
                    example:
                      - authorization_code
                      - implicit
                      - refresh_token
                      - password
                      - client_credentials
                      - urn:ietf:params:oauth:grant-type:device_code
                    items:
                      type: string
                    type: array
                  introspection_endpoint:
                    example: https://auth.legion.com/realms/legion/protocol/openid-connect/token/introspect
                    type: string
                  issuer:
                    example: https://auth.legion.com/realms/legion
                    type: string
                  jwks_uri:
                    example: https://auth.legion.com/realms/legion/protocol/openid-connect/certs
                    type: string
                  registration_endpoint:
                    example: https://auth.legion.com/realms/legion/clients-registrations/openid-connect
                    type: string
                  request_parameter_supported:
                    example: true
                    type: boolean
                  request_uri_parameter_supported:
                    example: true
                    type: boolean
                  require_request_uri_registration:
                    example: true
                    type: boolean
                  response_modes_supported:
                    example:
                      - query
                      - fragment
                      - form_post
                    items:
                      type: string
                    type: array
                  response_types_supported:
                    example:
                      - code
                      - id_token
                      - token id_token
                      - code id_token
                      - code token
                      - code token id_token
                    items:
                      type: string
                    type: array
                  revocation_endpoint:
                    example: https://auth.legion.com/realms/legion/protocol/openid-connect/revoke
                    type: string
                  scopes_supported:
                    example:
                      - openid
                      - profile
                      - email
                      - offline_access
                    items:
                      type: string
                    type: array
                  token_endpoint:
                    example: https://auth.legion.com/realms/legion/protocol/openid-connect/token
                    type: string
                  token_endpoint_auth_methods_supported:
                    example:
                      - client_secret_basic
                      - client_secret_post
                      - client_secret_jwt
                      - private_key_jwt
                    items:
                      type: string
                    type: array
                required:
                  - issuer
                  - authorization_endpoint
                  - token_endpoint
                  - jwks_uri
                  - response_types_supported
                type: object
              example:
                authorization_endpoint: https://auth.legion.com/realms/legion/protocol/openid-connect/auth
                code_challenge_methods_supported:
                  - plain
                  - S256
                grant_types_supported:
                  - authorization_code
                  - refresh_token
                  - client_credentials
                introspection_endpoint: https://auth.legion.com/realms/legion/protocol/openid-connect/token/introspect
                issuer: https://auth.legion.com/realms/legion
                jwks_uri: https://auth.legion.com/realms/legion/protocol/openid-connect/certs
                response_types_supported:
                  - code
                  - id_token
                  - token id_token
                revocation_endpoint: https://auth.legion.com/realms/legion/protocol/openid-connect/revoke
                scopes_supported:
                  - openid
                  - profile
                  - email
                  - offline_access
                token_endpoint: https://auth.legion.com/realms/legion/protocol/openid-connect/token
        "400":
