  /v3/tasking:
    post:
      summary: Dispatch task
      description: Dispatches a task to the specified entity using the specified MQTT topic and payload. The command must have been registered in the system and the payload must match the schema for that command.
      tags:
        - Tasking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                command_name:
                  example: Restart
                  type: string
                entity_id:
                  example: d4e5f6a1-b2c3-7890-1234-567890abcdef
                  format: uuid
                  type: string
                payload:
                  example:
                    force: true
                    reason: System maintenance
                    timeout: 30
                  type: object
                qos:
                  example: 1
                  maximum: 2
                  minimum: 0
                  type: number
              required:
                - entity_id
                - command_name
                - qos
