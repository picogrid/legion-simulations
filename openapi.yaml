                          type: string
                        issue:
                          example: must be a valid email address
                          type: string
                      required:
                        - field
                        - issue
                      type: object
                    type: array
                  message:
                    example: Request cannot be processed due to invalid input
                    type: string
                  status:
                    example: error
                    type: string
                  timestamp:
                    example: "2026-01-15T14:32:45Z"
                    type: string
                  trace_id:
                    example: req_2J9K8L7M6N5P4Q3R
                    type: string
                required:
                  - status
                  - code
                  - message
                  - category
                  - timestamp
                  - trace_id
                type: object
        "401":
          description: Unauthorized
