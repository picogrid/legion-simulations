        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                properties:
                  category:
                    description: The category of the error
                    example: server_error
                    type: string
                  code:
                    description: The HTTP status code
                    example: "500"
                    type: number
                  details:
                    description: Additional details about the error
                    items:
                      properties:
                        field:
