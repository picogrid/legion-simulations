                  status:
                    example: error
                    type: string
                  timestamp:
                    example: "2026-01-15T14:32:45Z"
                    type: string
                  trace_id:
                    example: req_2J9K8L7M6N5P4Q3R
                    type: string
                required:
                  - status
                  - code
                  - message
                  - category
                  - timestamp
                  - trace_id
                type: object
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                properties:
                  category:
                    type: string
                  code:
                    example: 404
                    type: number
                  details:
                    example:
                      - Field: organization_id
                        Issue: organization with ID 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' not found
                    items:
                      properties:
                        field:
                          example: email
                          type: string
                        issue:
                          example: must be a valid email address
                          type: string
                      required:
                        - field
                        - issue
                      type: object
                    type: array
                  message:
                    example: The requested resource could not be found
                    type: string
                  status:
                    example: error
                    type: string
                  timestamp:
                    example: "2026-01-15T14:32:45Z"
                    type: string
                  trace_id:
                    example: req_2J9K8L7M6N5P4Q3R
                    type: string
                required:
                  - status
                  - code
                  - message
                  - category
                  - timestamp
                  - trace_id
                type: object
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                properties:
                  category:
                    description: The category of the error
                    example: server_error
                    type: string
                  code:
                    description: The HTTP status code
                    example: "500"
                    type: number
                  details:
                    description: Additional details about the error
                    items:
                      properties:
                        field:
                          description: The field that caused the error
                          example: field_name
                          type: string
                        issue:
                          description: The specific issue with the field
                          example: Field validation issue
                          type: string
                      type: object
                    type: array
                  message:
                    description: A human-readable error message
                    example: Internal Server Error
                    type: string
                  status:
                    description: The status of the response, always 'error' for error responses
                    example: error
                    type: string
                  timestamp:
                    description: The timestamp when the error occurred
                    example: "2024-03-15T10:30:00Z"
                    format: date-time
                    type: string
                  trace_id:
                    description: A unique identifier for tracing the error
                    example: b7c5e4d3-a2b1-4f0e-8d9c-1a2b3c4d5e6f
                    format: uuid
                    type: string
                required:
                  - status
                  - code
                  - message
                  - category
                  - timestamp
                  - trace_id
                type: object
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                properties:
                  category:
