                          example: field_name
                          type: string
                        issue:
                          description: The specific issue with the field
                          example: Field validation issue
                          type: string
                      type: object
                    type: array
                  message:
                    description: A human-readable error message
                    example: Internal Server Error
                    type: string
                  status:
                    description: The status of the response, always 'error' for error responses
                    example: error
                    type: string
                  timestamp:
                    description: The timestamp when the error occurred
                    example: "2024-03-15T10:30:00Z"
                    format: date-time
                    type: string
                  trace_id:
                    description: A unique identifier for tracing the error
                    example: b7c5e4d3-a2b1-4f0e-8d9c-1a2b3c4d5e6f
                    format: uuid
                    type: string
